<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do Usuário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="cabecalho-principal">
        <h1 class="center">Área de Cadastro</h1>
    </header>

    <main class="container">
        <h2>Preencha seus dados</h2>
        
        <form id="formDemo" action="#" method="post">
            
            <label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome" required><br><br>

            <label for="idade">Idade:</label><br>
            <input type="number" id="idade" name="idade" min="0" required><br><br>

            <label for="email">E-mail de Contato:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="endereco">Endereço Completo:</label><br>
            <textarea id="endereco" name="endereco" rows="4" cols="30" required></textarea><br><br>

            <input type="submit" value="Enviar Cadastro">
        </form>

        <br>
        <a href="home.html">Voltar para o Início</a>
        
        <p id="outSubmit" style="color: green; font-weight: bold;"></p>
    </main>

    <script src="script.js"></script>
</body>
</html>
