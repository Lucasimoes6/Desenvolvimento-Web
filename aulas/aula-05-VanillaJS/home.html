<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="Aplicação web desenvolvida com Vanilla JS para a Aula 05, demonstrando manipulação de DOM e mídias.">
    <title>Desenvolvimento Web - Aula 05</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="cabecalho-principal">
        <h1 class="center">Desenvolvimento Web - Aula 05</h1>
    </header>

    <main>
        <section id="multimidia" class="container">
            <h2>Conteúdo Multimídia</h2>

            <p>UniFacens</p>
            <a href="https://www.facens.br" target="_blank">Acessar o site da Facens</a>
            <br><br>
        </section>

        <section class="container">
            <h2>Vídeo</h2>
            <video src="midia/Praia - Mar - Paisagem linda - Pôr do sol - Vídeo de fundo - 9s.mp4" controls width="320" height="240"></video>
        </section>
        
        <section class="container">
            <h2>Som</h2>
            <audio controls>
                <source src="midia/Rihanna - Only Girl - Refrão - - pedroiivo3369 (youtube).mp3" type="audio/mpeg">
                <source src="musica.ogg" type="audio/ogg">
                Seu navegador não suporta a tag de áudio.
            </audio>
        </section>

        <section id="midias" class="container">
            <h2>Imagem Aleatória</h2>
            <img src="https://picsum.photos/300/200?random=1" alt="Imagem Aleatória gerada dinamicamente" id="randomImage">
       
        </section>

        <section id="interatividade" class="container">
            <h2>JavaScript</h2>
            <p id="texto-alvo">Clique no botão para mudar de site!</p>
            <button id="meuBotao">Clique Aqui</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
